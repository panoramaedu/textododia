<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <title>Textododia</title>

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <!--
        FASE 6 — FALLBACK DE ROTA

        Hospedagens estáticas (GitHub Pages, etc.)
        não sabem que /leitura/nivel-1/200 deve
        carregar o mesmo index.html — elas servem
        esta página de erro 404 no lugar.

        Aqui a gente guarda o caminho pedido e manda
        o navegador para o index.html, que lê o
        parâmetro "redirect" e restaura a rota certa
        (ver js/router.js).
    -->

    <script>

        var path =
            window.location.pathname +
            window.location.search +
            window.location.hash;

        window.location.replace(
            "/index.html?redirect=" +
            encodeURIComponent(path)
        );

    </script>

</head>

<body>

    <p>
        Redirecionando para o Textododia...
    </p>

</body>

</html>
