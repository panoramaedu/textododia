<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Textododia</title>


    <!-- PWA -->

    <link
        rel="manifest"
        href="manifest.json"
    >

    <meta
        name="theme-color"
        content="#641f2c"
    >


    <!-- FONTES -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Momo+Signature&family=Nunito+Sans:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap"
        rel="stylesheet"
    >


    <!-- CSS -->

    <link
        rel="stylesheet"
        href="css/style.css"
    >

</head>


<body>


    <main class="app">


        <header class="site-header">

            <div class="site-header-content">

                <h1>
                    Textododia
                </h1>

                <p>
                    Uma leitura para cada dia.
                </p>

            </div>


            <button
                class="menu-button"
                id="menu-button"
                type="button"
                aria-label="Abrir menu"
                aria-expanded="false"
                aria-controls="side-menu"
            >

                <span></span>
                <span></span>
                <span></span>

            </button>

        </header>


        <section class="envelope-area">


            <div class="envelope">


                <div class="envelope-back"></div>


                <article
                    class="letter"
                    id="letter"
                >

                    <div class="letter-content">


                        <div
                            class="text-date"
                            id="text-date"
                        ></div>


                        <div
                            class="text-metadata"
                            id="text-metadata"
                        ></div>


                        <div
                            class="reading-content"
                            id="reading-content"
                        ></div>


                        <div class="letter-signature">

                            TTD

                        </div>


                    </div>

                </article>


                <div class="envelope-front"></div>


                <div class="envelope-flap"></div>


                <div
                    class="envelope-controls"
                    id="envelope-controls"
                >


                    <div
                        class="level-selection"
                        id="level-selection"
                    >


                        <button
                            class="level-seal"
                            data-level="nivel-1"
                            type="button"
                        >

                            <span class="seal-number">
                                Nível 1
                            </span>

                            <span class="seal-description">
                                Leitura inicial
                            </span>

                        </button>


                        <button
                            class="level-seal"
                            data-level="nivel-2"
                            type="button"
                        >

                            <span class="seal-number">
                                Nível 2
                            </span>

                            <span class="seal-description">
                                Leitura intermediária
                            </span>

                        </button>


                        <button
                            class="level-seal"
                            data-level="nivel-3"
                            type="button"
                        >

                            <span class="seal-number">
                                Nível 3
                            </span>

                            <span class="seal-description">
                                Leitura avançada
                            </span>

                        </button>


                        <button
                            class="level-seal"
                            data-level="nivel-4"
                            type="button"
                        >

                            <span class="seal-number">
                                Nível 4
                            </span>

                            <span class="seal-description">
                                Leitura especializada
                            </span>

                        </button>


                    </div>


                    <button
                        class="read-button"
                        id="read-button"
                        type="button"
                        disabled
                    >

                        Ler

                    </button>


                </div>


            </div>


        </section>


        <footer class="site-footer">


            <p>

                Plataforma desenvolvida por
                <strong>Gabriel Alves</strong>
                |

                <a
                    href="https://panoramaedu.onrender.com/"
                    target="_blank"
                    rel="noopener noreferrer"
                >

                    Panorama Educação

                </a>

            </p>


            <p class="donation-message">

                <a href="#">

                    Ajude a manter essa ferramenta!
                    Faça uma doação!

                </a>

            </p>


        </footer>


    </main>


    <!-- MENU LATERAL -->

    <aside
        class="side-menu"
        id="side-menu"
        aria-hidden="true"
    >

        <div class="side-menu-header">

            <span>
                Menu
            </span>

            <button
                class="menu-close"
                id="menu-close"
                type="button"
                aria-label="Fechar menu"
            >
                &times;
            </button>

        </div>


        <div class="side-menu-content">


            <div class="menu-section">

                <h2>
                    Compartilhar
                </h2>

                <button
                    class="menu-link-button share-text-button"
                    id="share-button"
                    type="button"
                    disabled
                >

                    Compartilhar texto de hoje

                </button>

            </div>


            <div class="menu-section">

                <h2>
                    Leitura offline
                </h2>

                <label class="offline-option">

                    <div class="offline-option-text">

                        <strong>
                            Manter textos offline
                        </strong>

                        <small>
                            Baixa a biblioteca para ler sem internet.
                        </small>

                    </div>

                    <input
                        type="checkbox"
                        id="offline-toggle"
                    >

                    <span class="toggle"></span>

                </label>

                <p
                    class="offline-status"
                    id="offline-status"
                ></p>

            </div>


        </div>

    </aside>


    <div
        class="menu-overlay"
        id="menu-overlay"
    ></div>


    <!-- MARKED -->

    <script
        src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"
    ></script>


    <!-- QRCODE -->

    <script
        src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"
    ></script>


    <!-- APP -->

    <script
        type="module"
        src="js/app.js"
    ></script>


</body>

</html>
